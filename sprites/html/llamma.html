<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Llama 4-Frame Walk Cycle</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #2b2b2b;
  }
  canvas {
    /* Enforce hard-edge pixel scaling */
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    /* Checkerboard to display transparency */
    background-image:
      linear-gradient(45deg, #3a3a3a 25%, transparent 25%),
      linear-gradient(-45deg, #3a3a3a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #3a3a3a 75%),
      linear-gradient(-45deg, transparent 75%, #3a3a3a 75%);
    background-size: 32px 32px;
    background-position: 0 0, 0 16px, 16px -16px, -16px 0px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 2px solid #111;
  }
</style>
</head>
<body>

<canvas id="spriteCanvas" width="512" height="128"></canvas>

<script>
  // Color Palette
  const colors = {
    'O': '#2A1F1D', // Dark Outline
    'W': '#F9F6F0', // Base White/Cream Body
    'S': '#E8B99A', // Tan Snout/Ear
    'E': '#000000'  // Eye
  };

  // Frame 1: Neutral Stand
  const f1 = [
    "................",
    "....OO..........",
    "...OWWO.........",
    "...OWWO.........",
    "..OWWEWO........",
    "..OWWSSO........",
    "..OWSSSO........",
    "..OOOWWO........",
    "....OWWO..OOOO..",
    "....OWWWOOWWWWO.",
    "....OWWWWWWWWWO.",
    "....OWWWWWWWWOO.",
    ".....OWWWOOWWO..",
    ".....OWWO.OWWO..",
    ".....OOOO.OOOO..",
    "................"
  ];

  // Frame 2: Left foot forward, 1px body dip
  const f2 = [
    "................",
    "................",
    "....OO..........",
    "...OWWO.........",
    "...OWWO.........",
    "..OWWEWO........",
    "..OWWSSO........",
    "..OWSSSO........",
    "..OOOWWO........",
    "....OWWO..OOOO..",
    "....OWWWOOWWWWO.",
    "....OWWWWWWWWWO.",
    "....OWWWWWWWWOO.",
    "....OWWO..OWWO..",
    "....OWWO..OWWO..",
    "....OOOO..OOOO.."
  ];

  // Frame 3: Neutral Stand (Duplicate of F1)
  const f3 = [
    "................",
    "....OO..........",
    "...OWWO.........",
    "...OWWO.........",
    "..OWWEWO........",
    "..OWWSSO........",
    "..OWSSSO........",
    "..OOOWWO........",
    "....OWWO..OOOO..",
    "....OWWWOOWWWWO.",
    "....OWWWWWWWWWO.",
    "....OWWWWWWWWOO.",
    ".....OWWWOOWWO..",
    ".....OWWO.OWWO..",
    ".....OOOO.OOOO..",
    "................"
  ];

  // Frame 4: Right foot forward, 1px body dip
  const f4 = [
    "................",
    "................",
    "....OO..........",
    "...OWWO.........",
    "...OWWO.........",
    "..OWWEWO........",
    "..OWWSSO........",
    "..OWSSSO........",
    "..OOOWWO........",
    "....OWWO..OOOO..",
    "....OWWWOOWWWWO.",
    "....OWWWWWWWWWO.",
    "....OWWWWWWWWOO.",
    ".....OWWO..OWWO.",
    ".....OWWO..OWWO.",
    ".....OOOO..OOOO."
  ];

  const frames = [f1, f2, f3, f4];
  const canvas = document.getElementById('spriteCanvas');
  const ctx = canvas.getContext('2d');

  // Scale up 8x (64x16 -> 512x128)
  ctx.scale(8, 8);

  // Draw loop
  frames.forEach((frame, index) => {
    const offsetX = index * 16;
    for (let y = 0; y < 16; y++) {
      for (let x = 0; x < 16; x++) {
        const pixelChar = frame[y][x];
        if (colors[pixelChar]) {
          ctx.fillStyle = colors[pixelChar];
          ctx.fillRect(offsetX + x, y, 1, 1);
        }
      }
    }
  });
</script>

</body>
</html>
